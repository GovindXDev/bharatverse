[theme]
primaryColor = "#FF6B35"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#262730"
font = "sans serif"

[server]
headless = true
maxUploadSize = 100
maxMessageSize = 100
enableWebsocketCompression = true
enableCORS = true
enableXsrfProtection = true

[browser]
gatherUsageStats = false
serverPort = 8501

[client]
showErrorDetails = true
toolbarMode = "minimal"

[runner]
magicEnabled = true
fastReruns = true

[logger]
level = "INFO"
messageFormat = "%(asctime)s %(message)s"
